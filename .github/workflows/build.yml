name: Build and Release Standalone Executable

on:
  push:
    tags:
      - 'v*' # Triggers on releases with tag v1.0, v1.0.0, etc.

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Build using .NET 10 SDK

    - name: Restore Dependencies
      run: dotnet restore ScreenProtector/ScreenProtector.csproj

    - name: Publish Single-File Executable
      run: |
        dotnet publish ScreenProtector/ScreenProtector.csproj `
          -c Release `
          -r win-x64 `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:PublishTrimmed=false `
          -p:WindowsPackageType=None `
          --self-contained true `
          -o publish/
      # Note: We set PublishTrimmed=false because WinUI 3 controls can sometimes have XAML binding resolution issues when trimmed under high-level trimming. Keeping it false guarantees 100% stability out-of-the-box, which is highly recommended for collaborative projects.

    - name: Rename Output Executable
      shell: pwsh
      run: |
        Rename-Item -Path "publish\ScreenProtector.exe" -NewName "ScreenProtector_${{ github.ref_name }}_x64.exe"

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: publish/ScreenProtector_${{ github.ref_name }}_x64.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        body: |
          ## Screen Protector (屏幕滤镜 & 保护器) ${{ github.ref_name }}
          
          This is an automated build generated by GitHub Actions upon tag release.
          
          ### Features Included in this Release:
          - **Topmost Screen Filter**: Set visual effects across your entire desktop with native click-through support.
          - **Pixel Art Mode**: Customize block sizes, toggle monochrome, or pick Retro colors (GameBoy Green, Amber Phosphor, Cyberpunk Cyan).
          - **CRT Scanline Mode**: Authentic horizontal scanline grid, Aperture Grille RGB phosphor mask, and animated vertical rolling scan sweep.
          - **Mica Settings Dashboard**: Beautiful, Windows 11 Fluent settings panels.
          
          ### Installation Instructions:
          - Download the `ScreenProtector_${{ github.ref_name }}_x64.exe` file.
          - Double-click to run! It is **completely self-contained and standalone** — no .NET installation is required.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
